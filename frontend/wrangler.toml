# Cloudflare Pages 配置
name = "vision-insight"
compatibility_date = "2024-01-01"

# R2 存储桶（存储图片）
[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "vision-insight-images"

# D1 数据库（存储分析结果）
[[d1_databases]]
binding = "DB"
database_name = "vision-insight-db"
database_id = "<YOUR_D1_DATABASE_ID>"

# Workers AI（图像分析）
[ai]
binding = "AI"
