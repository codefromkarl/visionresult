<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Insight Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; background: rgba(0,0,0,0.3);
    }
    .logo { font-size: 1.5rem; background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav { display: flex; gap: 0.8rem; align-items: center; }
    .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .nav-btn:hover { background: rgba(255,255,255,0.2); }
    .nav-btn.active { background: rgba(0,210,255,0.3); border-color: #00d2ff; }
    .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .lang-btn.active { background: rgba(0,210,255,0.3); border-color: #00d2ff; }
    .main { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .page { display: none; }
    .page.active { display: block; }
    h1 { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #aaa; text-align: center; margin-bottom: 2rem; }
    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 2rem; }
    .feature { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.5rem 1rem; text-align: center; }
    .feature-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .feature-title { font-size: 0.9rem; color: #ccc; }
    .upload-zone { margin-top: 2rem; border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px; padding: 2rem; cursor: pointer; position: relative; text-align: center; }
    .upload-zone:hover { border-color: #00d2ff; background: rgba(0,210,255,0.05); }
    .upload-zone.dragover { border-color: #00d2ff; background: rgba(0,210,255,0.1); }
    .upload-zone p { color: #888; margin-top: 0.5rem; }
    .upload-zone input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .result { display: none; margin-top: 2rem; }
    .result.show { display: block; }
    .result-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .result-card h3 { color: #00d2ff; margin-bottom: 0.8rem; font-size: 1rem; }
    .result-card p, .result-card li { color: #ccc; line-height: 1.6; font-size: 0.9rem; }
    .result-card ul { padding-left: 1.2rem; }
    .confidence { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    .confidence.high { background: rgba(0,200,0,0.2); color: #4ade80; }
    .confidence.medium { background: rgba(255,200,0,0.2); color: #facc15; }
    .confidence.low { background: rgba(255,0,0,0.2); color: #f87171; }
    .loading { display: none; margin-top: 2rem; text-align: center; }
    .loading.show { display: block; }
    .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #00d2ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .preview { display: none; margin-top: 1rem; text-align: center; }
    .preview.show { display: block; }
    .preview img { max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
    .history-list { margin-top: 1rem; }
    .history-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; margin-bottom: 0.8rem; cursor: pointer; display: flex; gap: 1rem; align-items: center; }
    .history-item:hover { background: rgba(255,255,255,0.1); border-color: #00d2ff; }
    .history-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: rgba(255,255,255,0.1); }
    .history-info { flex: 1; min-width: 0; }
    .history-filename { color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-time { color: #888; font-size: 0.8rem; margin-top: 0.2rem; }
    .history-meta { display: flex; gap: 0.5rem; margin-top: 0.3rem; }
    .history-tag { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: rgba(0,210,255,0.2); color: #00d2ff; }
    .history-actions { display: flex; gap: 0.5rem; }
    .history-status { padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; }
    .history-status.completed { background: rgba(0,200,0,0.2); color: #4ade80; }
    .history-status.processing { background: rgba(255,200,0,0.2); color: #facc15; }
    .history-delete { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); color: #f87171; padding: 0.2rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .empty-state { text-align: center; padding: 3rem; color: #888; }
    .result-image { max-width: 100%; max-height: 300px; border-radius: 8px; margin-bottom: 1rem; }
    .footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #555; padding: 1rem; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔍 Visual Insight</div>
    <div class="nav">
      <button class="nav-btn active" onclick="showPage('upload')" data-i18n="navUpload">上传分析</button>
      <button class="nav-btn" onclick="showPage('history')" data-i18n="navHistory">历史记录</button>
      <button class="lang-btn active" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="main">
    <div id="page-upload" class="page active">
      <h1>🔍 Visual Insight</h1>
      <p class="subtitle" data-i18n="subtitle">多模态图片分析系统</p>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*">
        <div style="font-size:3rem">📸</div>
        <p data-i18n="uploadHint">拖拽图片到此处，或点击上传</p>
        <p style="font-size:0.8rem;color:#555;margin-top:0.5rem" data-i18n="uploadSupport">支持 JPG / PNG / WebP</p>
      </div>
      <div class="preview" id="preview"><img id="previewImg" alt=""></div>
      <div class="loading" id="loading"><div class="spinner"></div><p style="color:#aaa" data-i18n="analyzing">正在分析...</p></div>
      <div class="result" id="result"></div>
      <div class="features">
        <div class="feature"><div class="feature-icon">🏷️</div><div class="feature-title" data-i18n="f1">OCR 文字</div></div>
        <div class="feature"><div class="feature-icon">📍</div><div class="feature-title" data-i18n="f2">地点推测</div></div>
        <div class="feature"><div class="feature-icon">🔗</div><div class="feature-title" data-i18n="f3">证据链</div></div>
      </div>
    </div>

    <div id="page-history" class="page">
      <h1>📋 <span data-i18n="historyTitle">历史记录</span></h1>
      <p class="subtitle" data-i18n="historySub">点击查看详情</p>
      <div id="historyList" class="history-list"></div>
    </div>
    <div class="footer">Powered by Cloudflare Workers AI</div>
  </div>

<script>
const API='https://vision-insight-api.1069123094.workers.dev';
const I18N={zh:{navUpload:'上传分析',navHistory:'历史记录',subtitle:'多模态图片分析系统 — 视觉分析 + 证据链推理',uploadHint:'拖拽图片到此处，或点击上传',uploadSupport:'支持 JPG / PNG / WebP',analyzing:'正在分析图片...',f1:'OCR 文字识别',f2:'地点推测',f3:'证据链推理',historyTitle:'历史记录',historySub:'点击查看详情',scene:'场景分析',loc:'地点推测',time:'时间推测',text:'检测文字',evidence:'关键证据',type:'场景类型',info:'任务信息',sec:'秒',fail:'上传失败',empty:'暂无记录',del:'确定删除？'},en:{navUpload:'Upload',navHistory:'History',subtitle:'Multimodal Image Analysis',uploadHint:'Drag & drop or click',uploadSupport:'JPG / PNG / WebP',analyzing:'Analyzing...',f1:'OCR Text',f2:'Location',f3:'Evidence',historyTitle:'History',historySub:'Click to view',scene:'Scene',loc:'Location',time:'Time',text:'Text',evidence:'Evidence',type:'Type',info:'Info',sec:'s',fail:'Upload failed',empty:'No records',del:'Delete?'}};
let L=localStorage.getItem('lang')||'zh';
function t(k){return I18N[L]?.[k]||I18N.zh[k]||k}
function setLang(l){L=l;localStorage.setItem('lang',l);document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===(l==='zh'?'中文':'EN')));document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t(e.dataset.i18n))}
setLang(L);

function showPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelector(`.nav-btn[onclick="showPage('${p}')"]`).classList.add('active');if(p==='history')loadHistory()}

const fi=document.getElementById('fileInput'),uz=document.getElementById('uploadZone'),pv=document.getElementById('preview'),pi=document.getElementById('previewImg'),ld=document.getElementById('loading'),rs=document.getElementById('result');
fi.addEventListener('change',e=>{const f=e.target.files[0];if(f)handleFile(f)});
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('dragover')});
uz.addEventListener('dragleave',()=>uz.classList.remove('dragover'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f?.type.startsWith('image/'))handleFile(f)});

async function handleFile(file){
  const r=new FileReader();r.onload=e=>{pi.src=e.target.result;pv.classList.add('show')};r.readAsDataURL(file);
  ld.classList.add('show');rs.classList.remove('show');rs.innerHTML='';
  try{const fd=new FormData();fd.append('file',file);const resp=await fetch(API+'/api/analyze',{method:'POST',body:fd});if(!resp.ok)throw new Error('HTTP '+resp.status);const d=await resp.json();await poll(d.task_id)}catch(e){showErr(t('fail')+': '+e.message)}finally{ld.classList.remove('show')}
}

async function poll(id,max=30){
  for(let i=0;i<max;i++){await new Promise(r=>setTimeout(r,2000));try{const resp=await fetch(API+'/api/report/'+id);if(!resp.ok)continue;const rpt=await resp.json();if(rpt.status==='completed'){render(rpt);return}if(rpt.status==='failed'){showErr('Failed');return}}catch{}}
  showErr('Timeout')
}

function render(rpt){
  let h='';const a=rpt.analysis||{};
  if(rpt.image_url)h+=`<img src="${API}${rpt.image_url}" class="result-image" alt="">`;
  if(a.description)h+=`<div class="result-card"><h3>🎬 ${t('scene')}</h3><p>${esc(a.description)}</p></div>`;
  if(a.location_guess){const c=a.location_guess.confidence||0,cls=c>=.7?'high':c>=.4?'medium':'low';h+=`<div class="result-card"><h3>📍 ${t('loc')}</h3><p>${esc(a.location_guess.location)} <span class="confidence ${cls}">${Math.round(c*100)}%</span></p></div>`}
  if(a.time_guess){const p=[a.time_guess.time_of_day,a.time_guess.season].filter(Boolean);if(p.length)h+=`<div class="result-card"><h3>🕐 ${t('time')}</h3><p>${p.map(esc).join(' · ')}</p></div>`}
  if(a.detected_text?.length)h+=`<div class="result-card"><h3>📝 ${t('text')}</h3><ul>${a.detected_text.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`;
  if(a.key_evidence?.length)h+=`<div class="result-card"><h3>🔗 ${t('evidence')}</h3><ul>${a.key_evidence.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`;
  if(a.scene_type)h+=`<div class="result-card"><h3>🏷️ ${t('type')}</h3><p>${esc(a.scene_type)}</p></div>`;
  const el=Math.round((new Date(rpt.completed_at)-new Date(rpt.created_at))/1000);
  h+=`<div class="result-card"><h3>ℹ️ ${t('info')}</h3><p>ID: ${rpt.id} · ${el}${t('sec')}</p></div>`;
  rs.innerHTML=h;rs.classList.add('show')
}

function showErr(m){rs.innerHTML=`<div class="result-card" style="border-color:rgba(255,0,0,0.3)"><h3>❌</h3><p>${esc(m)}</p></div>`;rs.classList.add('show')}

async function loadHistory(){
  const list=document.getElementById('historyList');list.innerHTML='<div style="text-align:center;color:#888">Loading...</div>';
  try{const resp=await fetch(API+'/api/history?limit=20');const d=await resp.json();
  if(!d.items?.length){list.innerHTML=`<div class="empty-state">${t('empty')}</div>`;return}
  list.innerHTML=d.items.map(i=>{
    const time=new Date(i.created_at).toLocaleString(L==='zh'?'zh-CN':'en-US');
    const thumb=i.image_key?`${API}/images/${i.image_key}`:'';
    const analysis=i.result?JSON.parse(i.result):null;
    const tags=analysis?[analysis.scene_type,analysis.location_guess?.location].filter(Boolean):[];
    return `<div class="history-item" onclick="viewReport('${i.id}')">
      ${thumb?`<img src="${thumb}" class="history-thumb" onerror="this.style.display='none'">`:''}
      <div class="history-info">
        <div class="history-filename">${esc(i.filename||'unknown')}</div>
        <div class="history-time">${time}</div>
        <div class="history-meta">${tags.map(t=>`<span class="history-tag">${esc(t)}</span>`).join('')}</div>
      </div>
      <div class="history-actions">
        <span class="history-status ${i.status}">${i.status==='completed'?'✓':'⏳'}</span>
        <button class="history-delete" onclick="event.stopPropagation();del('${i.id}')">×</button>
      </div>
    </div>`}).join('')}catch(e){list.innerHTML=`<div class="empty-state">Error: ${e.message}</div>`}
}

async function viewReport(id){showPage('upload');rs.innerHTML='<div style="text-align:center;color:#888">Loading...</div>';rs.classList.add('show');try{const resp=await fetch(API+'/api/report/'+id);render(await resp.json())}catch(e){showErr(e.message)}}

async function del(id){if(!confirm(t('del')))return;await fetch(API+'/api/delete/'+id,{method:'DELETE'});loadHistory()}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
</script>
</body>
</html>
