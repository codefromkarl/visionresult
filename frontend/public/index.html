<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="多模态图片分析系统 - 视觉分析 + 证据链推理">
    <title>Visual Insight Agent</title>
    
    <!-- 样式表 -->
    <link rel="stylesheet" href="src/css/base.css">
    <link rel="stylesheet" href="src/css/toast.css">
    <link rel="stylesheet" href="src/css/upload.css">
    <link rel="stylesheet" href="src/css/events.css">
    <link rel="stylesheet" href="src/css/report.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
</head>
<body>
    <div class="container" role="main">
        <!-- 标题 -->
        <header>
            <h1>🔍 Visual Insight Agent</h1>
            <p class="subtitle text-secondary text-center mb-8">多模态图片分析系统 — 视觉分析 + 证据链推理</p>
        </header>

        <!-- 上传卡片 -->
        <section class="card" aria-label="图片上传">
            <div class="upload-zone" 
                 id="uploadZone" 
                 role="button" 
                 tabindex="0"
                 aria-label="点击或拖拽图片到此处上传">
                <span class="upload-zone-icon" aria-hidden="true">📸</span>
                <h3 class="upload-zone-title">拖拽图片到此处或点击上传</h3>
                <p class="upload-zone-subtitle">支持 JPG、PNG、GIF、WebP 格式</p>
                <div class="upload-zone-formats">
                    <span class="upload-zone-format">JPG</span>
                    <span class="upload-zone-format">PNG</span>
                    <span class="upload-zone-format">GIF</span>
                    <span class="upload-zone-format">WebP</span>
                </div>
            </div>
            <input type="file" 
                   id="fileInput" 
                   accept="image/*"
                   aria-label="选择图片文件">

            <!-- 图片预览 -->
            <div class="preview-container" id="previewContainer" aria-label="图片预览">
                <img id="previewImg" 
                     class="preview-img" 
                     alt="选择的图片预览">
            </div>

            <!-- 分析选项 -->
            <div class="analysis-options">
                <label for="verboseCheck">
                    <input type="checkbox" id="verboseCheck">
                    <span>启用详细推理链路（verbose 模式）</span>
                </label>
                <div class="analyze-btn-container">
                    <button class="btn btn-lg" 
                            id="analyzeBtn" 
                            disabled
                            aria-label="开始分析图片">
                        🚀 开始分析
                    </button>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-container" id="progressContainer" role="progressbar" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">
                    <span class="progress-stage">准备中...</span>
                    <span class="progress-percent">0%</span>
                </div>
            </div>
        </section>

        <!-- 分析过程卡片 -->
        <section class="card events-container" 
                 id="eventsContainer" 
                 aria-label="分析过程"
                 style="display: none;">
            <div class="events-header">
                <h3>🧠 分析过程</h3>
            </div>
            <div class="events-stats" id="eventsStats"></div>
            <div class="events-timeline" 
                 id="eventsTimeline"
                 role="log"
                 aria-live="polite"
                 aria-label="分析事件时间线"></div>
        </section>

        <!-- 结果卡片 -->
        <section class="card result-container" 
                 id="resultContainer" 
                 aria-label="分析结果"
                 style="display: none;">
            <div class="report-header">
                <h2>📊 分析报告</h2>
                <div class="report-actions">
                    <button class="btn btn-sm btn-outline" 
                            onclick="downloadMarkdown()"
                            aria-label="下载 Markdown 格式报告">
                        📄 Markdown
                    </button>
                    <button class="btn btn-sm btn-outline" 
                            onclick="downloadHTML()"
                            aria-label="下载 HTML 格式报告">
                        🌐 HTML
                    </button>
                    <button class="btn btn-sm btn-outline" 
                            id="traceToggleBtn"
                            aria-label="显示/隐藏推理链路">
                        🔍 推理链路
                    </button>
                </div>
            </div>
            
            <!-- 报告内容 -->
            <div class="report-content" 
                 id="reportContent"
                 role="document"
                 aria-label="分析报告内容"></div>
            
            <!-- 推理链路容器 -->
            <div class="trace-container" id="traceContainer" aria-label="推理链路详情">
                <div class="reasoning-section">
                    <h3>🧠 思考链条与调用证据链</h3>
                    <div id="reasoningContainer"></div>
                </div>
                <h3>⚙️ Pipeline 执行详情</h3>
                <div class="trace-timeline" id="traceTimeline"></div>
            </div>
        </section>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container" 
         class="toast-container" 
         role="alert" 
         aria-live="polite"></div>

    <!-- 应用脚本 -->
    <script type="module" src="src/js/app.js"></script>
</body>
</html>
