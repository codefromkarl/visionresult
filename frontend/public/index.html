<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Insight Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #aaa; margin-bottom: 2rem; font-size: 1.1rem; }
    .lang-switch {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    .lang-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.2); }
    .lang-btn.active { background: rgba(0,210,255,0.3); border-color: #00d2ff; }
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 2rem;
    }
    .feature {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem 1rem;
    }
    .feature-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .feature-title { font-size: 0.9rem; color: #ccc; }
    .upload-zone {
      margin-top: 2rem;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 2rem;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .upload-zone:hover { border-color: #00d2ff; background: rgba(0, 210, 255, 0.05); }
    .upload-zone.dragover { border-color: #00d2ff; background: rgba(0, 210, 255, 0.1); }
    .upload-zone p { color: #888; margin-top: 0.5rem; }
    .upload-zone input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .result { display: none; margin-top: 2rem; text-align: left; }
    .result.show { display: block; }
    .result-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .result-card h3 { color: #00d2ff; margin-bottom: 0.8rem; font-size: 1rem; }
    .result-card p, .result-card li { color: #ccc; line-height: 1.6; font-size: 0.9rem; }
    .result-card ul { padding-left: 1.2rem; }
    .confidence { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    .confidence.high { background: rgba(0,200,0,0.2); color: #4ade80; }
    .confidence.medium { background: rgba(255,200,0,0.2); color: #facc15; }
    .confidence.low { background: rgba(255,0,0,0.2); color: #f87171; }
    .loading { display: none; margin-top: 2rem; }
    .loading.show { display: block; }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #00d2ff;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .preview { display: none; margin-top: 1rem; }
    .preview.show { display: block; }
    .preview img {
      max-width: 100%; max-height: 200px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
    }
    .footer { margin-top: 2rem; font-size: 0.75rem; color: #555; }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>

  <div class="container">
    <h1>🔍 Visual Insight</h1>
    <p class="subtitle" data-i18n="subtitle">多模态图片分析系统 — 视觉分析 + 证据链推理</p>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*">
      <div style="font-size: 3rem;">📸</div>
      <p data-i18n="uploadHint">拖拽图片到此处，或点击上传</p>
      <p style="font-size: 0.8rem; color: #555; margin-top: 0.5rem;" data-i18n="uploadSupport">支持 JPG / PNG / WebP</p>
    </div>

    <div class="preview" id="preview">
      <img id="previewImg" alt="preview">
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="color: #aaa;" data-i18n="analyzing">正在分析图片...</p>
    </div>

    <div class="result" id="result"></div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🏷️</div>
        <div class="feature-title" data-i18n="featureOcr">OCR 文字识别</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📍</div>
        <div class="feature-title" data-i18n="featureLocation">地点推测</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔗</div>
        <div class="feature-title" data-i18n="featureEvidence">证据链推理</div>
      </div>
    </div>

    <div class="footer">Powered by Cloudflare Workers AI</div>
  </div>

  <script>
    // === i18n ===
    const I18N = {
      zh: {
        subtitle: '多模态图片分析系统 — 视觉分析 + 证据链推理',
        uploadHint: '拖拽图片到此处，或点击上传',
        uploadSupport: '支持 JPG / PNG / WebP',
        analyzing: '正在分析图片...',
        featureOcr: 'OCR 文字识别',
        featureLocation: '地点推测',
        featureEvidence: '证据链推理',
        sceneAnalysis: '场景分析',
        locationGuess: '地点推测',
        timeGuess: '时间推测',
        detectedText: '检测到的文字',
        keyEvidence: '关键证据',
        sceneType: '场景类型',
        taskInfo: '任务信息',
        elapsed: '耗时',
        seconds: '秒',
        uploadFailed: '上传失败',
        analysisFailed: '分析失败',
        unknownError: '未知错误',
        timeout: '分析超时',
        completed: '分析完成',
        noResult: '分析完成，但无详细结果',
      },
      en: {
        subtitle: 'Multimodal Image Analysis — Visual Analysis + Evidence Chain',
        uploadHint: 'Drag & drop image here, or click to upload',
        uploadSupport: 'Supports JPG / PNG / WebP',
        analyzing: 'Analyzing image...',
        featureOcr: 'OCR Text Recognition',
        featureLocation: 'Location Guess',
        featureEvidence: 'Evidence Chain',
        sceneAnalysis: 'Scene Analysis',
        locationGuess: 'Location Guess',
        timeGuess: 'Time Guess',
        detectedText: 'Detected Text',
        keyEvidence: 'Key Evidence',
        sceneType: 'Scene Type',
        taskInfo: 'Task Info',
        elapsed: 'Elapsed',
        seconds: 's',
        uploadFailed: 'Upload failed',
        analysisFailed: 'Analysis failed',
        unknownError: 'Unknown error',
        timeout: 'Analysis timeout',
        completed: 'Analysis completed',
        noResult: 'Completed, but no detailed results',
      }
    };

    let currentLang = localStorage.getItem('lang') || 'zh';

    function t(key) {
      return I18N[currentLang]?.[key] || I18N.zh[key] || key;
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === (lang === 'zh' ? '中文' : 'EN'));
      });
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      applyLang();
    }

    function applyLang() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
    }

    // Init lang
    setLang(currentLang);

    // === API ===
    const API_BASE = 'https://vision-insight-api.1069123094.workers.dev';

    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    });

    async function handleFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        preview.classList.add('show');
      };
      reader.readAsDataURL(file);

      loading.classList.add('show');
      result.classList.remove('show');
      result.innerHTML = '';

      try {
        const formData = new FormData();
        formData.append('file', file);
        const response = await fetch(`${API_BASE}/api/analyze`, { method: 'POST', body: formData });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        await pollResult(data.task_id);
      } catch (err) {
        showError(`${t('uploadFailed')}: ${err.message}`);
      } finally {
        loading.classList.remove('show');
      }
    }

    async function pollResult(taskId, maxAttempts = 30) {
      for (let i = 0; i < maxAttempts; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const response = await fetch(`${API_BASE}/api/report/${taskId}`);
          if (!response.ok) continue;
          const report = await response.json();
          if (report.status === 'completed') { renderReport(report); return; }
          if (report.status === 'failed') { showError(`${t('analysisFailed')}: ${report.error || t('unknownError')}`); return; }
        } catch { continue; }
      }
      showError(t('timeout'));
    }

    function renderReport(report) {
      let html = '';
      const a = report.analysis || {};

      if (a.description) {
        html += `<div class="result-card"><h3>🎬 ${t('sceneAnalysis')}</h3><p>${esc(a.description)}</p></div>`;
      }

      if (a.location_guess) {
        const conf = a.location_guess.confidence || 0;
        const cls = conf >= 0.7 ? 'high' : conf >= 0.4 ? 'medium' : 'low';
        html += `<div class="result-card">
          <h3>📍 ${t('locationGuess')}</h3>
          <p>${esc(a.location_guess.location)} <span class="confidence ${cls}">${Math.round(conf * 100)}%</span></p>
        </div>`;
      }

      if (a.time_guess) {
        const parts = [a.time_guess.time_of_day, a.time_guess.season].filter(Boolean);
        if (parts.length) {
          html += `<div class="result-card"><h3>🕐 ${t('timeGuess')}</h3><p>${parts.map(esc).join(' · ')}</p></div>`;
        }
      }

      if (a.detected_text?.length) {
        html += `<div class="result-card"><h3>📝 ${t('detectedText')}</h3><ul>${a.detected_text.map(item => `<li>${esc(item)}</li>`).join('')}</ul></div>`;
      }

      if (a.key_evidence?.length) {
        html += `<div class="result-card"><h3>🔗 ${t('keyEvidence')}</h3><ul>${a.key_evidence.map(item => `<li>${esc(item)}</li>`).join('')}</ul></div>`;
      }

      if (a.scene_type) {
        html += `<div class="result-card"><h3>🏷️ ${t('sceneType')}</h3><p>${esc(a.scene_type)}</p></div>`;
      }

      const elapsed = Math.round((new Date(report.completed_at) - new Date(report.created_at)) / 1000);
      html += `<div class="result-card"><h3>ℹ️ ${t('taskInfo')}</h3><p>ID: ${report.id} · ${t('elapsed')}: ${elapsed}${t('seconds')}</p></div>`;

      result.innerHTML = html || `<div class="result-card"><p>${t('noResult')}</p></div>`;
      result.classList.add('show');
    }

    function showError(msg) {
      result.innerHTML = `<div class="result-card" style="border-color: rgba(255,0,0,0.3);"><h3>❌ Error</h3><p>${esc(msg)}</p></div>`;
      result.classList.add('show');
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
