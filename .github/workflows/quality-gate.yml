name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ─── 1. 代码质量检查 ─────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  # ─── 2. 单元测试 + 覆盖率 ─────────────────────────────────
  unit-test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"

      - name: Run Unit Tests with Coverage
        run: |
          pytest tests/unit/ tests/quality/ \
            --cov=vision_insight \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -q

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─── 3. 集成测试 ─────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration/ tests/evaluation/ -q

  # ─── 4. E2E 测试 ─────────────────────────────────────────
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: playwright install chromium --with-deps

      - name: Run E2E Tests
        run: pytest tests/e2e/ -q

      - name: E2E Quality Guard
        run: |
          pytest tests/quality/test_quality_guard.py -k "E2E" -q

  # ─── 5. 质量门禁 ─────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, e2e-test]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "Unit Test: ${{ needs.unit-test.result }}"
          echo "Integration: ${{ needs.integration-test.result }}"
          echo "E2E: ${{ needs.e2e-test.result }}"

          if [[ "${{ needs.unit-test.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration-test.result }}" != "success" ]]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-test.result }}" != "success" ]]; then
            echo "❌ E2E tests failed"
            exit 1
          fi

          echo "✅ All quality checks passed"

  # ─── 6. 部署 (仅 main 分支) ──────────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Frontend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/public --project-name=vision-insight --branch=main

      - name: Health Check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://vision-insight.pages.dev/")
          if [[ "$STATUS" != "200" ]]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"
