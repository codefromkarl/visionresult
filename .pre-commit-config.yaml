repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [src/vision_insight]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy>=2.0
          - httpx>=0.27
          - fastapi>=0.110
          - types-pillow
